<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro recebido — DQ</title>
<meta name="description" content="Página de obrigado do teste de captação.">
<link rel="canonical" href="https://site.dissecandoquestoes.com/captacao/teste/obrigado/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://site.dissecandoquestoes.com/captacao/teste/obrigado/">
<meta property="og:title" content="Cadastro recebido — DQ">
<meta property="og:description" content="Página de obrigado do teste de captação.">
<meta name="robots" content="noindex, nofollow">

<style>
  :root {
    --dq-laranja: #FF751F;
    --dq-verde: #6EA27C;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    background: #f4f4f4;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: #fff;
    max-width: 440px;
    width: 100%;
    border-radius: 16px;
    padding: 40px 28px;
    box-shadow: 0 6px 24px rgba(0,0,0,.10);
    text-align: center;
  }
  .selo {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: var(--dq-verde);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    line-height: 1;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 10px;
    color: var(--dq-laranja);
  }
  p {
    color: #555;
    line-height: 1.5;
    margin: 0 0 8px;
  }
  .nota {
    margin-top: 20px;
    font-size: .8rem;
    color: #999;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="selo" aria-hidden="true">✓</div>
    <h1>Cadastro recebido!</h1>
    <p>Se você está vendo esta página, o fluxo de <strong>redirecionamento pós-cadastro</strong> (final "Obrigado") funcionou de ponta a ponta.</p>
    <p class="nota">Página interna de teste — <code>captacao/teste/obrigado</code>.</p>
  </main>
</body>
</html>
