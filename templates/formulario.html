<!--
  SNIPPET CANÔNICO — formulário de captação DQ (páginas externas)

  Como usar ao criar uma isca em /iscas/nome-da-isca/index.html:
  1. Troque data-slug pelo slug cadastrado na tela "Captação Externa" do CRM.
     O slug DEVE ser igual ao nome da pasta da isca.
  2. Inclua o script lead-capture.js antes do </body> (caminho relativo à pasta da isca).
  3. TODA a copy (títulos, subtítulos, texto do botão) é ESTÁTICA no HTML —
     o HTML é a fonte única de apresentação. A tela do CRM governa apenas o
     comportamento (destino pós-submit, campanha, automação UnniChat).
  4. Se o destino da página for "obrigado", crie a subpasta obrigado/ da isca
     (/iscas/nome-da-isca/obrigado/index.html) com copy estática — exemplo em
     /iscas/teste-captacao/obrigado/.
  5. NÃO existe tag nem link do UnniChat no HTML — o acionamento acontece no
     servidor, no submit.
-->

<section class="container">
  <h1>Título da isca</h1>
  <p>Subtítulo da isca</p>

  <form class="dq-lead-form" data-slug="TROCAR-PELO-SLUG">
    <p>
      <label for="dq-nome">Nome</label><br>
      <input id="dq-nome" name="nome" type="text" placeholder="Seu nome" required
             autocomplete="name" style="width:100%;max-width:420px;padding:0.75em;border:1px solid #ccc;border-radius:8px;">
    </p>
    <p>
      <label for="dq-whatsapp">WhatsApp</label><br>
      <input id="dq-whatsapp" name="whatsapp" type="tel" placeholder="(73) 9 9999-0002" required
             autocomplete="tel" inputmode="numeric" style="width:100%;max-width:420px;padding:0.75em;border:1px solid #ccc;border-radius:8px;">
    </p>
    <p>
      <label for="dq-email">E-mail</label><br>
      <input id="dq-email" name="email" type="email" placeholder="seu@email.com"
             autocomplete="email" style="width:100%;max-width:420px;padding:0.75em;border:1px solid #ccc;border-radius:8px;">
    </p>
    <button type="submit" class="btn-cta">QUERO RECEBER</button>
  </form>
</section>

<!-- antes do </body> (a partir de /iscas/nome-da-isca/ o caminho é ../../): -->
<script src="../../assets/js/lead-capture.js"></script>
