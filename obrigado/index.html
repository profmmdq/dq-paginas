<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado! — Dissecando Questões</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .obrigado { max-width: 560px; margin: 0 auto; padding: 4rem 1rem; text-align: center; }
    .obrigado h1 { color: var(--dq-verde); }
    .obrigado .btn-cta { margin-top: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="obrigado container">
    <h1>Cadastro confirmado! ✅</h1>
    <p id="dq-texto">Recebemos seus dados. Em breve você recebe as próximas instruções no WhatsApp.</p>
    <a id="dq-download" class="btn-cta hidden" href="#" target="_blank" rel="noopener">BAIXAR MATERIAL</a>
  </main>

  <script>
    (function () {
      "use strict";
      var API_URL = "https://kqvwmmiguoqfuseabmtt.supabase.co/functions/v1/api-pagina-externa";
      var slug = new URLSearchParams(window.location.search).get("slug");
      if (!slug) return; // sem slug: mantém texto genérico

      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "load", slug: slug }),
      })
        .then(function (res) { return res.json(); })
        .then(function (json) {
          if (!json || !json.success || !json.data) return;
          var config = json.data.config || {};
          if (config.texto_obrigado) {
            document.getElementById("dq-texto").textContent = config.texto_obrigado;
          }
          if (config.url_download_isca) {
            var btn = document.getElementById("dq-download");
            btn.href = config.url_download_isca;
            btn.classList.remove("hidden");
          }
        })
        .catch(function () { /* mantém texto genérico */ });
    })();
  </script>
</body>
</html>
